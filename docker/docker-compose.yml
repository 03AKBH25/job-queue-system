version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: job_queue_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "#12AkzD@4L"
      POSTGRES_DB: job_queue_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: job_queue_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:

