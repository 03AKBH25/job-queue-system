version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: job_queue_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: job_queue_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  postgres_data: