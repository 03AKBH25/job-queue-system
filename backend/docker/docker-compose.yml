version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: job_queue_postgres_clean
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: job_queue_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: job_queue_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  postgres_data: